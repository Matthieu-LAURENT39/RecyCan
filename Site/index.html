<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cannes Recycle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <script>
    const DEPOSIT_PER_BOTTLE = 3n   // Wei
    const SYMBOL             = "Wei"
  </script>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">

  <header class="bg-green-800 px-8 py-5 grid grid-cols-3 items-center">
    <div class="flex items-center gap-3">
      <span class="text-2xl">♻️</span>
      <div>
        <h1 class="text-lg font-bold text-white tracking-tight">Cannes Recycle</h1>
        <p class="text-green-300 text-xs tracking-wide">Deposit · Blockchain</p>
      </div>
    </div>
    <nav class="flex gap-3 justify-center">
      <button id="btn-buy" onclick="switchView('buy')"
        class="px-6 py-2 bg-white text-green-800 font-semibold rounded-xl text-sm transition-colors hover:bg-green-50">
        🛒 Buy
      </button>
      <button id="btn-return" onclick="switchView('return')"
        class="px-6 py-2 border-2 border-white text-white font-semibold rounded-xl text-sm transition-colors hover:bg-green-700">
        ↩️ Return
      </button>
    </nav>
    <div></div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-lg">

      <!-- Home -->
      <div id="view-home" class="flex flex-col items-center justify-center text-center gap-3 py-16">
        <span class="text-5xl">🥤</span>
        <h2 class="text-2xl font-bold text-gray-800">Welcome</h2>
        <p class="text-gray-400 text-sm">Select an action from the menu</p>
      </div>

      <!-- Buy -->
      <div id="view-buy" class="hidden border-2 border-gray-200 rounded-2xl p-8 space-y-4">
        <h2 class="text-xl font-bold mb-2">Buy a bottle</h2>

        <!-- Scanner -->
        <div>
          <button onclick="openScanner('buy')"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-500 hover:border-green-600 hover:text-green-700 transition-colors flex items-center justify-center gap-2">
            📷 Scan barcode
          </button>
        </div>
        <div id="scanner-buy" class="hidden space-y-2">
          <video id="video-buy" class="w-full rounded-xl border border-gray-200" autoplay muted playsinline></video>
          <div class="flex items-center justify-between">
            <p class="text-xs text-gray-400">Barcode detected :</p>
            <p id="barcode-buy" class="text-sm font-mono font-semibold text-green-700">—</p>
          </div>
          <button onclick="closeScanner('buy')"
            class="w-full text-xs text-gray-400 hover:text-gray-600 py-1">
            ✕ Close camera
          </button>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Quantity</label>
          <input id="qty-buy" type="number" min="1" value="1" oninput="updateBuy()"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>
        <div class="flex justify-between text-sm py-3 border-t border-gray-100">
          <span class="text-gray-500">Total deposit</span>
          <span id="total-buy" class="font-semibold">3 Wei</span>
        </div>
        <button class="w-full bg-green-800 hover:bg-green-900 text-white font-semibold rounded-xl py-3 transition-colors">
          Confirm purchase
        </button>
      </div>

      <!-- Return -->
      <div id="view-return" class="hidden border-2 border-gray-200 rounded-2xl p-8 space-y-4">
        <h2 class="text-xl font-bold mb-2">Return a bottle</h2>

        <!-- Scanner -->
        <div>
          <button onclick="openScanner('return')"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-500 hover:border-green-600 hover:text-green-700 transition-colors flex items-center justify-center gap-2">
            📷 Scan barcode
          </button>
        </div>
        <div id="scanner-return" class="hidden space-y-2">
          <video id="video-return" class="w-full rounded-xl border border-gray-200" autoplay muted playsinline></video>
          <div class="flex items-center justify-between">
            <p class="text-xs text-gray-400">Barcode detected :</p>
            <p id="barcode-return" class="text-sm font-mono font-semibold text-green-700">—</p>
          </div>
          <button onclick="closeScanner('return')"
            class="w-full text-xs text-gray-400 hover:text-gray-600 py-1">
            ✕ Close camera
          </button>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Your address</label>
          <input type="text" placeholder="0x..."
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Number of bottles</label>
          <input id="qty-return" type="number" min="1" value="1" oninput="updateReturn()"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>
        <div class="flex justify-between text-sm py-3 border-t border-gray-100">
          <span class="text-gray-500">Estimated refund</span>
          <span id="total-return" class="font-semibold text-green-800">3 Wei</span>
        </div>
        <button class="w-full border-2 border-green-800 text-green-800 hover:bg-green-50 font-semibold rounded-xl py-3 transition-colors">
          Claim my deposit
        </button>
      </div>

    </div>
  </main>

  <footer class="py-4 text-center text-xs text-gray-300">
    Cannes Recycle · ETHGlobal 2026
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('qty-buy').value = 1
      document.getElementById('qty-return').value = 1
      updateBuy()
      updateReturn()
    })

    // ─── Calculs ─────────────────────────────────────────────
    function updateBuy() {
      const qty = BigInt(document.getElementById('qty-buy').value || 0)
      document.getElementById('total-buy').textContent = `${qty * DEPOSIT_PER_BOTTLE} ${SYMBOL}`
    }

    function updateReturn() {
      const qty = BigInt(document.getElementById('qty-return').value || 0)
      document.getElementById('total-return').textContent = `${qty * DEPOSIT_PER_BOTTLE} ${SYMBOL}`
    }

    // ─── Scanner ─────────────────────────────────────────────
    const readers = {}

    function openScanner(view) {
      document.getElementById('scanner-' + view).classList.remove('hidden')
      const video   = document.getElementById('video-' + view)
      const barcode = document.getElementById('barcode-' + view)
      const reader  = new ZXing.BrowserMultiFormatReader()
      readers[view] = reader

      reader.decodeFromConstraints(
        { video: { facingMode: 'environment' } },
        video,
        (result, err) => {
          if (result) {
            barcode.textContent = result.getText()
          }
        }
      )
    }

    function closeScanner(view) {
      if (readers[view]) {
        readers[view].reset()
        delete readers[view]
      }
      document.getElementById('scanner-' + view).classList.add('hidden')
      document.getElementById('barcode-' + view).textContent = '—'
    }

    // ─── Navigation ──────────────────────────────────────────
    function switchView(view) {
      ['home', 'buy', 'return'].forEach(v => {
        document.getElementById('view-' + v).classList.toggle('hidden', v !== view);
        if (v !== view && readers[v]) closeScanner(v)
      });
      const btnB = document.getElementById('btn-buy');
      const btnR = document.getElementById('btn-return');
      if (view === 'buy') {
        btnB.classList.add('bg-white', 'text-green-800');
        btnB.classList.remove('border-2', 'border-white', 'text-white');
        btnR.classList.add('border-2', 'border-white', 'text-white');
        btnR.classList.remove('bg-white', 'text-green-800');
      } else if (view === 'return') {
        btnR.classList.add('bg-white', 'text-green-800');
        btnR.classList.remove('border-2', 'border-white', 'text-white');
        btnB.classList.add('border-2', 'border-white', 'text-white');
        btnB.classList.remove('bg-white', 'text-green-800');
      }
    }
  </script>

</body>
</html>
