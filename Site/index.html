<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cannes Recycle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <script>
    const DEPOSIT_PER_BOTTLE = 3n   // Wei
    const SYMBOL             = "Wei"
  </script>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">

  <header class="bg-green-800 px-8 py-5 grid grid-cols-3 items-center">
    <div class="flex items-center gap-3">
      <span class="text-2xl">♻️</span>
      <div>
        <h1 class="text-lg font-bold text-white tracking-tight">Cannes Recycle</h1>
        <p class="text-green-300 text-xs tracking-wide">Deposit · Blockchain</p>
      </div>
    </div>
    <nav class="flex gap-3 justify-center">
      <button id="btn-buy" onclick="switchView('buy')"
        class="px-6 py-2 bg-white text-green-800 font-semibold rounded-xl text-sm transition-colors hover:bg-green-50">
        🛒 Buy
      </button>
      <button id="btn-return" onclick="switchView('return')"
        class="px-6 py-2 border-2 border-white text-white font-semibold rounded-xl text-sm transition-colors hover:bg-green-700">
        ↩️ Return
      </button>
    </nav>
    <div></div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-8">
    <div class="w-full max-w-lg">

      <!-- Home -->
      <div id="view-home" class="flex flex-col items-center justify-center text-center gap-3 py-16">
        <span class="text-5xl">🥤</span>
        <h2 class="text-2xl font-bold text-gray-800">Welcome</h2>
        <p class="text-gray-400 text-sm">Select an action from the menu</p>
      </div>

      <!-- Buy -->
      <div id="view-buy" class="hidden border-2 border-gray-200 rounded-2xl p-8 space-y-4">
        <h2 class="text-xl font-bold mb-2">Buy a bottle</h2>

        <!-- Scanner -->
        <button onclick="openScanner('buy')"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-500 hover:border-green-600 hover:text-green-700 transition-colors flex items-center justify-center gap-2">
          📷 Scan a barcode
        </button>
        <div id="scanner-buy" class="hidden space-y-2">
          <video id="video-buy" class="w-full rounded-xl border border-gray-200" autoplay muted playsinline></video>
          <div class="flex items-center justify-between text-xs">
            <span class="text-gray-400">Scanning...</span>
            <span id="last-scan-buy" class="font-mono text-green-700">—</span>
          </div>
          <button onclick="closeScanner('buy')" class="w-full text-xs text-gray-400 hover:text-gray-600 py-1">
            ✕ Close camera
          </button>
        </div>

        <!-- Liste des produits scannés -->
        <div id="list-buy" class="hidden space-y-2">
          <div class="flex items-center justify-between">
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wide">Scanned items</p>
            <button onclick="resetList('buy')"
              class="text-xs text-red-400 hover:text-red-600 transition-colors">
              🗑 Clear all
            </button>
          </div>
          <div id="items-buy" class="space-y-2"></div>
        </div>

        <!-- Total -->
        <div class="flex justify-between text-sm py-3 border-t border-gray-100">
          <span class="text-gray-500">Total deposit</span>
          <span id="total-buy" class="font-semibold">0 Wei</span>
        </div>
        <button class="w-full bg-green-800 hover:bg-green-900 text-white font-semibold rounded-xl py-3 transition-colors">
          Confirm purchase
        </button>
      </div>

      <!-- Return -->
      <div id="view-return" class="hidden border-2 border-gray-200 rounded-2xl p-8 space-y-4">
        <h2 class="text-xl font-bold mb-2">Return a bottle</h2>

        <!-- Scanner -->
        <button onclick="openScanner('return')"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-500 hover:border-green-600 hover:text-green-700 transition-colors flex items-center justify-center gap-2">
          📷 Scan a barcode
        </button>
        <div id="scanner-return" class="hidden space-y-2">
          <video id="video-return" class="w-full rounded-xl border border-gray-200" autoplay muted playsinline></video>
          <div class="flex items-center justify-between text-xs">
            <span class="text-gray-400">Scanning...</span>
            <span id="last-scan-return" class="font-mono text-green-700">—</span>
          </div>
          <button onclick="closeScanner('return')" class="w-full text-xs text-gray-400 hover:text-gray-600 py-1">
            ✕ Close camera
          </button>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Your address</label>
          <input type="text" placeholder="0x..."
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>

        <!-- Liste des produits scannés -->
        <div id="list-return" class="hidden space-y-2">
          <div class="flex items-center justify-between">
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wide">Scanned items</p>
            <button onclick="resetList('return')"
              class="text-xs text-red-400 hover:text-red-600 transition-colors">
              🗑 Clear all
            </button>
          </div>
          <div id="items-return" class="space-y-2"></div>
        </div>

        <!-- Total -->
        <div class="flex justify-between text-sm py-3 border-t border-gray-100">
          <span class="text-gray-500">Estimated refund</span>
          <span id="total-return" class="font-semibold text-green-800">0 Wei</span>
        </div>
        <button class="w-full border-2 border-green-800 text-green-800 hover:bg-green-50 font-semibold rounded-xl py-3 transition-colors">
          Claim my deposit
        </button>
      </div>

    </div>
  </main>

  <!-- Toast scan -->
  <div id="toast"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-green-700 text-white text-sm font-semibold px-5 py-2 rounded-full shadow-lg opacity-0 translate-y-2 transition-all duration-300 pointer-events-none">
    ✅ Scanned !
  </div>

  <footer class="py-4 text-center text-xs text-gray-300">
    Cannes Recycle · ETHGlobal 2026
  </footer>

  <script>
    // ─── State ───────────────────────────────────────────────
    // { [view]: { [barcode]: quantity } }
    const scanned = { buy: {}, return: {} }
    const readers = {}
    const scanCooldown = {}
    const SCAN_DEBOUNCE_MS = 3000  // ms entre deux scans

    // ─── Rendu de la liste ───────────────────────────────────
    function renderList(view) {
      const items    = scanned[view]
      const container = document.getElementById('items-' + view)
      const list     = document.getElementById('list-' + view)
      const barcodes = Object.keys(items)

      if (barcodes.length === 0) {
        list.classList.add('hidden')
        return
      }
      list.classList.remove('hidden')

      container.innerHTML = barcodes.map(code => `
        <div class="flex items-center justify-between border border-gray-100 rounded-xl px-3 py-2 text-sm">
          <span class="font-mono text-gray-600 truncate max-w-[180px]">${code}</span>
          <div class="flex items-center gap-2 shrink-0">
            <button onclick="changeQty('${view}', '${code}', -1)"
              class="w-6 h-6 rounded-lg border border-gray-200 text-gray-500 hover:border-green-600 hover:text-green-700 flex items-center justify-center text-base leading-none">−</button>
            <input type="number" min="1" value="${items[code]}"
              onchange="setQty('${view}', '${code}', this.value)"
              class="w-12 text-center border border-gray-200 rounded-lg py-0.5 text-sm focus:outline-none focus:ring-1 focus:ring-green-400" />
            <button onclick="changeQty('${view}', '${code}', +1)"
              class="w-6 h-6 rounded-lg border border-gray-200 text-gray-500 hover:border-green-600 hover:text-green-700 flex items-center justify-center text-base leading-none">+</button>
            <button onclick="removeItem('${view}', '${code}')"
              class="ml-1 text-gray-300 hover:text-red-400 text-xs">✕</button>
          </div>
        </div>
      `).join('')

      updateTotal(view)
    }

    function updateTotal(view) {
      const items = scanned[view]
      const total = Object.values(items).reduce((sum, qty) => sum + BigInt(qty), 0n) * DEPOSIT_PER_BOTTLE
      document.getElementById('total-' + view).textContent = `${total} ${SYMBOL}`
    }

    // ─── Actions sur la liste ────────────────────────────────
    function changeQty(view, code, delta) {
      const newQty = (scanned[view][code] || 0) + delta
      if (newQty <= 0) {
        removeItem(view, code)
      } else {
        scanned[view][code] = newQty
        renderList(view)
      }
    }

    function setQty(view, code, value) {
      const qty = parseInt(value)
      if (!qty || qty <= 0) {
        removeItem(view, code)
      } else {
        scanned[view][code] = qty
        renderList(view)
      }
    }

    function removeItem(view, code) {
      delete scanned[view][code]
      renderList(view)
    }

    function resetList(view) {
      scanned[view] = {}
      renderList(view)
    }

    function addScan(view, code) {
      scanned[view][code] = (scanned[view][code] || 0) + 1
      document.getElementById('last-scan-' + view).textContent = code
      beep()
      flashScan(view)
      renderList(view)
    }

    function beep() {
      const ctx  = new AudioContext()
      const osc  = ctx.createOscillator()
      const gain = ctx.createGain()
      osc.connect(gain)
      gain.connect(ctx.destination)
      osc.frequency.value = 1200
      gain.gain.setValueAtTime(0.3, ctx.currentTime)
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15)
      osc.start(ctx.currentTime)
      osc.stop(ctx.currentTime + 0.15)
    }

    function flashScan(view) {
      const video = document.getElementById('video-' + view)

      // Flash vert sur la vidéo
      video.classList.add('ring-4', 'ring-green-400', 'ring-offset-2')
      setTimeout(() => {
        video.classList.remove('ring-4', 'ring-green-400', 'ring-offset-2')
      }, 600)

      // Toast "Scanned !"
      const toast = document.getElementById('toast')
      toast.classList.remove('opacity-0', 'translate-y-2')
      toast.classList.add('opacity-100', 'translate-y-0')
      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0')
        toast.classList.add('opacity-0', 'translate-y-2')
      }, 1200)
    }

    // ─── Scanner ─────────────────────────────────────────────
    function openScanner(view) {
      document.getElementById('scanner-' + view).classList.remove('hidden')
      const video  = document.getElementById('video-' + view)
      const reader = new ZXing.BrowserMultiFormatReader()
      readers[view] = reader

      reader.decodeFromConstraints(
        { video: { facingMode: 'environment' } },
        video,
        (result, err) => {
          if (result && !scanCooldown[view]) {
            scanCooldown[view] = true
            addScan(view, result.getText())
            setTimeout(() => { scanCooldown[view] = false }, SCAN_DEBOUNCE_MS)
          }
        }
      )
    }

    function closeScanner(view) {
      if (readers[view]) {
        readers[view].reset()
        delete readers[view]
      }
      document.getElementById('scanner-' + view).classList.add('hidden')
      document.getElementById('last-scan-' + view).textContent = '—'
    }

    // ─── Navigation ──────────────────────────────────────────
    function switchView(view) {
      ['home', 'buy', 'return'].forEach(v => {
        document.getElementById('view-' + v).classList.toggle('hidden', v !== view)
        if (v !== view && readers[v]) closeScanner(v)
      })
      const btnB = document.getElementById('btn-buy')
      const btnR = document.getElementById('btn-return')
      if (view === 'buy') {
        btnB.classList.add('bg-white', 'text-green-800')
        btnB.classList.remove('border-2', 'border-white', 'text-white')
        btnR.classList.add('border-2', 'border-white', 'text-white')
        btnR.classList.remove('bg-white', 'text-green-800')
      } else if (view === 'return') {
        btnR.classList.add('bg-white', 'text-green-800')
        btnR.classList.remove('border-2', 'border-white', 'text-white')
        btnB.classList.add('border-2', 'border-white', 'text-white')
        btnB.classList.remove('bg-white', 'text-green-800')
      }
    }
  </script>

</body>
</html>
