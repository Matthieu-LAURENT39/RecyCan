<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cannes Recycle</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">

  <header class="bg-green-800 px-8 py-5 grid grid-cols-3 items-center">
    <div class="flex items-center gap-3">
      <span class="text-2xl">♻️</span>
      <div>
        <h1 class="text-lg font-bold text-white tracking-tight">Cannes Recycle</h1>
        <p class="text-green-300 text-xs tracking-wide">Deposit · Blockchain</p>
      </div>
    </div>
    <nav class="flex gap-3 justify-center">
      <button class="px-6 py-2 bg-white text-green-800 font-semibold rounded-xl text-sm">
        🛒 Buy
      </button>
      <button class="px-6 py-2 border-2 border-white text-white font-semibold rounded-xl text-sm">
        ↩️ Return
      </button>
    </nav>
    <div></div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-lg">

      <div id="view-home" class="flex flex-col items-center justify-center text-center gap-3 py-16">
        <span class="text-5xl">🥤</span>
        <h2 class="text-2xl font-bold text-gray-800">Welcome</h2>
        <p class="text-gray-400 text-sm">Select an action from the menu</p>
      </div>
            <div id="view-buy" class="hidden border-2 border-gray-200 rounded-2xl p-8 space-y-4">
        <h2 class="text-xl font-bold mb-2">Buy a bottle</h2>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Quantity</label>
          <input type="number" min="1" value="1"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>
        <div class="flex justify-between text-sm py-3 border-t border-gray-100">
          <span class="text-gray-500">Total deposit</span>
          <span class="font-semibold">— ETH</span>
        </div>
        <button class="w-full bg-green-800 hover:bg-green-900 text-white font-semibold rounded-xl py-3 transition-colors">
          Confirm purchase
        </button>
      </div>

      <div id="view-return" class="hidden border-2 border-gray-200 rounded-2xl p-8 space-y-4">
        <h2 class="text-xl font-bold mb-2">Return a bottle</h2>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Your address</label>
          <input type="text" placeholder="0x..."
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Number of bottles</label>
          <input type="number" min="1" value="1"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-700" />
        </div>
        <div class="flex justify-between text-sm py-3 border-t border-gray-100">
          <span class="text-gray-500">Estimated refund</span>
          <span class="font-semibold text-green-800">— ETH</span>
        </div>
        <button class="w-full border-2 border-green-800 text-green-800 hover:bg-green-50 font-semibold rounded-xl py-3 transition-colors">
          Claim my deposit
        </button>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center text-xs text-gray-300">
    Cannes Recycle · ETHGlobal 2026
  </footer>

</body>
</html>
